name: Build Installers (macOS + Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-15
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      # ── Bundle external tools (gs, pngquant, cjpegli) ──
      - name: Bundle tools (macOS)
        if: runner.os == 'macOS'
        run: |
          set -e
          brew install ghostscript pngquant

          TOOLS_DIR="src-tauri/resources/tools"
          LIB_DIR="$TOOLS_DIR/lib"
          mkdir -p "$LIB_DIR"

          # Copy binaries
          GS_BIN="$(brew --prefix ghostscript)/bin/gs"
          PQ_BIN="$(brew --prefix pngquant)/bin/pngquant"
          cp "$GS_BIN" "$TOOLS_DIR/gs"
          cp "$PQ_BIN" "$TOOLS_DIR/pngquant"
          chmod +x "$TOOLS_DIR/gs" "$TOOLS_DIR/pngquant"

          # Build cjpegli from libjxl source (not available as Homebrew binary)
          brew install cmake ninja
          git clone --depth 1 --branch v0.11.2 https://github.com/libjxl/libjxl.git /tmp/libjxl
          cd /tmp/libjxl
          git submodule update --init --recursive --depth 1 --jobs 4
          mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DJPEGXL_ENABLE_JPEGLI=ON \
            -DJPEGXL_ENABLE_TOOLS=ON \
            -DBUILD_TESTING=OFF \
            -DJPEGXL_ENABLE_DOXYGEN=OFF \
            -DJPEGXL_ENABLE_MANPAGES=OFF \
            -DJPEGXL_ENABLE_BENCHMARK=OFF \
            -DJPEGXL_ENABLE_EXAMPLES=OFF \
            ..
          ninja -j$(sysctl -n hw.ncpu) tools/cjpegli
          cp tools/cjpegli "$OLDPWD/$TOOLS_DIR/cjpegli"
          chmod +x "$OLDPWD/$TOOLS_DIR/cjpegli"
          cd "$OLDPWD"
          echo "✅ Built and copied cjpegli from libjxl source"

          # Copy Ghostscript resource files (fonts, init, etc.)
          GS_SHARE="$(brew --prefix ghostscript)/share/ghostscript"
          if [ -d "$GS_SHARE" ]; then
            cp -R "$GS_SHARE" "$TOOLS_DIR/gsresource"
            echo "✅ Copied GS resources from $GS_SHARE"
          fi

          # Function: bundle dylibs for a binary
          bundle_dylibs() {
            local bin="$1"
            for dylib in $(otool -L "$bin" | tail -n +2 | awk '{print $1}'); do
              case "$dylib" in
                /opt/homebrew/*|/usr/local/*)
                  local base
                  base=$(basename "$dylib")
                  if [ ! -f "$LIB_DIR/$base" ]; then
                    cp "$dylib" "$LIB_DIR/$base"
                    bundle_dylibs "$LIB_DIR/$base"
                  fi
                  install_name_tool -change "$dylib" "@executable_path/lib/$base" "$bin" 2>/dev/null || true
                  ;;
              esac
            done
          }

          bundle_dylibs "$TOOLS_DIR/gs"
          bundle_dylibs "$TOOLS_DIR/pngquant"
          [ -f "$TOOLS_DIR/cjpegli" ] && bundle_dylibs "$TOOLS_DIR/cjpegli"

          # Fix inter-dylib references
          for lib in "$LIB_DIR"/*.dylib; do
            [ -f "$lib" ] || continue
            for dep in $(otool -L "$lib" | tail -n +2 | awk '{print $1}'); do
              case "$dep" in
                /opt/homebrew/*|/usr/local/*)
                  dep_base=$(basename "$dep")
                  if [ -f "$LIB_DIR/$dep_base" ]; then
                    install_name_tool -change "$dep" "@loader_path/$dep_base" "$lib" 2>/dev/null || true
                  fi
                  ;;
              esac
            done
          done

          # Ad-hoc sign everything
          for f in "$TOOLS_DIR/gs" "$TOOLS_DIR/pngquant" "$TOOLS_DIR/cjpegli"; do
            [ -f "$f" ] && codesign --force --sign - "$f"
          done
          for lib in "$LIB_DIR"/*.dylib; do
            [ -f "$lib" ] || continue
            codesign --force --sign - "$lib"
          done

          echo "✅ Bundled tools:"
          ls -la "$TOOLS_DIR/"
          echo "┅┅ lib/:"
          ls -la "$LIB_DIR/" || true
          echo "┅┅ gsresource/:"
          du -sh "$TOOLS_DIR/gsresource/" 2>/dev/null || true

      - name: Bundle tools (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $toolsDir = "src-tauri\resources\tools"
          New-Item -ItemType Directory -Force -Path "$toolsDir\lib" | Out-Null

          # Install Ghostscript
          choco install ghostscript -y --no-progress
          $gsDirs = Get-ChildItem "C:\Program Files\gs" -Directory -ErrorAction SilentlyContinue
          if ($gsDirs) {
            $gsDir = $gsDirs | Select-Object -Last 1
            $gsExe = Get-ChildItem $gsDir.FullName -Recurse -Filter "gswin64c.exe" | Select-Object -First 1
            if ($gsExe) {
              Copy-Item $gsExe.FullName "$toolsDir\gs.exe"
              Write-Host "✅ Copied gs.exe"
              # Copy GS DLL
              $gsDll = Get-ChildItem $gsExe.Directory.FullName -Filter "gsdll64.dll" -ErrorAction SilentlyContinue
              if ($gsDll) {
                Copy-Item $gsDll.FullName "$toolsDir\lib\"
                Write-Host "✅ Copied gsdll64.dll"
              }
              # Copy GS Resource directory (fonts, init, etc.)
              $gsResource = Join-Path $gsDir.FullName "Resource"
              if (Test-Path $gsResource) {
                Copy-Item -Recurse $gsResource "$toolsDir\gsresource\Resource"
                Write-Host "✅ Copied GS Resource dir"
              }
              $gsLib = Join-Path $gsDir.FullName "lib"
              if (Test-Path $gsLib) {
                New-Item -ItemType Directory -Force -Path "$toolsDir\gsresource\lib" | Out-Null
                Copy-Item "$gsLib\*" "$toolsDir\gsresource\lib\" -ErrorAction SilentlyContinue
                Write-Host "✅ Copied GS lib dir"
              }
            }
          }

          # Install pngquant
          choco install pngquant -y --no-progress
          $pqExe = Get-Command pngquant -ErrorAction SilentlyContinue
          if ($pqExe) {
            Copy-Item $pqExe.Source "$toolsDir\pngquant.exe"
            Write-Host "✅ Copied pngquant.exe"
          }

          # Download cjpegli from libjxl GitHub releases
          $jxlUrl = "https://github.com/libjxl/libjxl/releases/download/v0.11.2/jxl-x64-windows-static.zip"
          $jxlZip = "$env:TEMP\jxl.zip"
          $jxlExtract = "$env:TEMP\jxl"
          Invoke-WebRequest -Uri $jxlUrl -OutFile $jxlZip
          Expand-Archive -Path $jxlZip -DestinationPath $jxlExtract -Force
          $cjExe = Get-ChildItem $jxlExtract -Recurse -Filter "cjpegli.exe" | Select-Object -First 1
          if ($cjExe) {
            Copy-Item $cjExe.FullName "$toolsDir\cjpegli.exe"
            Write-Host "✅ Copied cjpegli.exe from libjxl release"
          } else {
            Write-Host "⚠️ cjpegli not found in libjxl release"
          }

          Write-Host "✅ Bundled tools:"
          Get-ChildItem "$toolsDir" -Recurse | Format-Table Name, Length

      - name: Build Tauri app (tag release)
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "はむはむ画像圧縮くん ${{ github.ref_name }}"
          releaseBody: |
            ## ダウンロード
            - **macOS (Apple Silicon)**: `.dmg` ファイル (arm64)
            - **macOS (Intel)**: `.dmg` ファイル (x64)
            - **Windows**: `.msi` または `.exe` インストーラー

            PDF圧縮（Ghostscript）・PNG圧縮（pngquant）・JPEG圧縮（cjpegli）ツールは同梱されています。
            追加のインストールは不要です。🐹
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Build Tauri app (manual)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

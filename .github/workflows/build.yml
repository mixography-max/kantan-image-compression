name: Build Installers (macOS + Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
            ect_asset: ect-0.9.5-mac-arm64.zip
            conda_platform: osx-arm64
          - platform: macos-14
            target: x86_64-apple-darwin
            label: macOS-x64
            ect_asset: ect-0.9.5-mac-x86-64.zip
            conda_platform: osx-64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64
            ect_asset: ect-0.9.5-win64.zip
            conda_platform: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      # ═══════════════════════════════════════════════════════════════
      # macOS ARM (native build on ARM runner)
      # ═══════════════════════════════════════════════════════════════
      - name: Bundle tools (macOS ARM)
        if: matrix.target == 'aarch64-apple-darwin'
        env:
          ECT_ASSET: ${{ matrix.ect_asset }}
        run: |
          set -euo pipefail
          TOOLS_DIR="$(pwd)/src-tauri/resources/tools"
          LIB_DIR="$TOOLS_DIR/lib"
          mkdir -p "$LIB_DIR"

          # ── Install Homebrew tools ──
          brew install ghostscript pngquant webp libavif dylibbundler

          cp "$(brew --prefix ghostscript)/bin/gs" "$TOOLS_DIR/gs"
          cp "$(brew --prefix pngquant)/bin/pngquant" "$TOOLS_DIR/pngquant"
          cp "$(brew --prefix webp)/bin/cwebp" "$TOOLS_DIR/cwebp"
          cp "$(brew --prefix libavif)/bin/avifenc" "$TOOLS_DIR/avifenc"
          chmod +x "$TOOLS_DIR/gs" "$TOOLS_DIR/pngquant" "$TOOLS_DIR/cwebp" "$TOOLS_DIR/avifenc"

          # ── cjpegli from conda-forge (pre-built, no compilation needed) ──
          curl -Ls "https://micro.mamba.pm/api/micromamba/osx-arm64/latest" | tar -xvj bin/micromamba
          ./bin/micromamba create -y -p /tmp/conda-jxl -c conda-forge libjxl-tools=0.11.2
          cp /tmp/conda-jxl/bin/cjpegli "$TOOLS_DIR/cjpegli"
          cp /tmp/conda-jxl/bin/cjxl    "$TOOLS_DIR/cjxl"
          chmod +x "$TOOLS_DIR/cjpegli" "$TOOLS_DIR/cjxl"
          echo "✅ cjpegli + cjxl installed from conda-forge"

          # ── GS resources ──
          GS_SHARE="$(brew --prefix ghostscript)/share/ghostscript"
          [ -d "$GS_SHARE" ] && cp -R "$GS_SHARE" "$TOOLS_DIR/gsresource"

          # ── ECT ──
          curl -L -o /tmp/ect.zip "https://github.com/fhanau/Efficient-Compression-Tool/releases/download/v0.9.5/${ECT_ASSET}"
          unzip -o /tmp/ect.zip -d /tmp/ect
          ECT_BIN=$(find /tmp/ect -name 'ect' -type f | head -1)
          [ -n "$ECT_BIN" ] && cp "$ECT_BIN" "$TOOLS_DIR/ect" && chmod +x "$TOOLS_DIR/ect"

          # ── Bundle dylibs ──
          for t in gs pngquant cwebp avifenc cjpegli cjxl ect; do
            if [ -f "$TOOLS_DIR/$t" ]; then
              dylibbundler -of -b \
                -s "/tmp/conda-jxl/lib" \
                -x "$TOOLS_DIR/$t" \
                -d "$LIB_DIR" \
                -p "@executable_path/lib"
            fi
          done

          # ── Codesign ──
          for f in "$TOOLS_DIR"/{gs,pngquant,cwebp,avifenc,cjpegli,cjxl,ect}; do [ -f "$f" ] && codesign --force --sign - "$f" 2>/dev/null || true; done
          for f in "$LIB_DIR"/*.dylib; do [ -f "$f" ] && codesign --force --sign - "$f" 2>/dev/null || true; done
          echo "✅ macOS ARM bundle complete"
          ls -la "$TOOLS_DIR/"

      # ═══════════════════════════════════════════════════════════════
      # macOS x64 (all tools from conda-forge for max compatibility)
      # ═══════════════════════════════════════════════════════════════
      - name: Bundle tools (macOS x64)
        if: matrix.target == 'x86_64-apple-darwin'
        env:
          ECT_ASSET: ${{ matrix.ect_asset }}
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          TOOLS_DIR="$(pwd)/src-tauri/resources/tools"
          LIB_DIR="$TOOLS_DIR/lib"
          mkdir -p "$LIB_DIR"

          brew install dylibbundler

          # ── All tools from conda-forge (x86_64, minos=11.0) ──
          curl -Ls "https://micro.mamba.pm/api/micromamba/osx-64/latest" | tar -xvj bin/micromamba
          ./bin/micromamba create -y -p /tmp/conda-env -c conda-forge \
            ghostscript pngquant libjxl-tools=0.11.2 libavif
          cp /tmp/conda-env/bin/gs       "$TOOLS_DIR/gs"
          cp /tmp/conda-env/bin/pngquant  "$TOOLS_DIR/pngquant"
          cp /tmp/conda-env/bin/cjpegli   "$TOOLS_DIR/cjpegli"
          cp /tmp/conda-env/bin/cjxl      "$TOOLS_DIR/cjxl"
          cp /tmp/conda-env/bin/avifenc   "$TOOLS_DIR/avifenc"
          chmod +x "$TOOLS_DIR/gs" "$TOOLS_DIR/pngquant" "$TOOLS_DIR/cjpegli" "$TOOLS_DIR/cjxl" "$TOOLS_DIR/avifenc"

          # ── cwebp from Google releases (x64 macOS) ──
          curl -L -o /tmp/libwebp.tar.gz "https://storage.googleapis.com/downloads.webmproject.org/releases/webp/libwebp-1.5.0-mac-x86-64.tar.gz"
          tar -xzf /tmp/libwebp.tar.gz -C /tmp/
          CWEBP_BIN=$(find /tmp/libwebp-* -name 'cwebp' -type f | head -1)
          if [ -n "$CWEBP_BIN" ]; then
            cp "$CWEBP_BIN" "$TOOLS_DIR/cwebp"
            chmod +x "$TOOLS_DIR/cwebp"
            echo "✅ cwebp installed from Google releases"
          fi

          # ── GS resources from conda ──
          GS_SHARE="/tmp/conda-env/share/ghostscript"
          [ -d "$GS_SHARE" ] && cp -R "$GS_SHARE" "$TOOLS_DIR/gsresource"

          # ── ECT ──
          curl -L -o /tmp/ect.zip "https://github.com/fhanau/Efficient-Compression-Tool/releases/download/v0.9.5/${ECT_ASSET}"
          unzip -o /tmp/ect.zip -d /tmp/ect
          ECT_BIN=$(find /tmp/ect -name 'ect' -type f | head -1)
          [ -n "$ECT_BIN" ] && cp "$ECT_BIN" "$TOOLS_DIR/ect" && chmod +x "$TOOLS_DIR/ect"

          # ── Bundle dylibs (search conda lib dir for @rpath resolution) ──
          for t in gs pngquant cwebp avifenc cjpegli cjxl ect; do
            if [ -f "$TOOLS_DIR/$t" ]; then
              dylibbundler -of -b \
                -s "/tmp/conda-env/lib" \
                -x "$TOOLS_DIR/$t" \
                -d "$LIB_DIR" \
                -p "@executable_path/lib"
            fi
          done

          # ── Codesign ──
          for f in "$TOOLS_DIR"/{gs,pngquant,cwebp,avifenc,cjpegli,cjxl,ect}; do [ -f "$f" ] && codesign --force --sign - "$f" 2>/dev/null || true; done
          for f in "$LIB_DIR"/*.dylib; do [ -f "$f" ] && codesign --force --sign - "$f" 2>/dev/null || true; done
          echo "✅ macOS x64 bundle complete"
          ls -la "$TOOLS_DIR/"

      # ═══════════════════════════════════════════════════════════════
      # Windows
      # ═══════════════════════════════════════════════════════════════
      - name: Bundle tools (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $toolsDir = "src-tauri\resources\tools"
          New-Item -ItemType Directory -Force -Path "$toolsDir\lib" | Out-Null

          # Install Ghostscript
          choco install ghostscript -y --no-progress
          $gsDirs = Get-ChildItem "C:\Program Files\gs" -Directory -ErrorAction SilentlyContinue
          if ($gsDirs) {
            $gsDir = $gsDirs | Select-Object -Last 1
            $gsExe = Get-ChildItem $gsDir.FullName -Recurse -Filter "gswin64c.exe" | Select-Object -First 1
            if ($gsExe) {
              Copy-Item $gsExe.FullName "$toolsDir\gs.exe"
              Write-Host "✅ Copied gs.exe"
              $gsDll = Get-ChildItem $gsExe.Directory.FullName -Filter "gsdll64.dll" -ErrorAction SilentlyContinue
              if ($gsDll) {
                Copy-Item $gsDll.FullName "$toolsDir\lib\"
                Write-Host "✅ Copied gsdll64.dll"
              }
              $gsResource = Join-Path $gsDir.FullName "Resource"
              if (Test-Path $gsResource) {
                Copy-Item -Recurse $gsResource "$toolsDir\gsresource\Resource"
                Write-Host "✅ Copied GS Resource dir"
              }
              $gsLib = Join-Path $gsDir.FullName "lib"
              if (Test-Path $gsLib) {
                New-Item -ItemType Directory -Force -Path "$toolsDir\gsresource\lib" | Out-Null
                Copy-Item "$gsLib\*" "$toolsDir\gsresource\lib\" -ErrorAction SilentlyContinue
                Write-Host "✅ Copied GS lib dir"
              }
            }
          }

          # Install pngquant
          choco install pngquant -y --no-progress
          $pqExe = Get-Command pngquant -ErrorAction SilentlyContinue
          if ($pqExe) {
            Copy-Item $pqExe.Source "$toolsDir\pngquant.exe"
            Write-Host "✅ Copied pngquant.exe"
          }

          # Download cjpegli from libjxl GitHub releases
          $jxlUrl = "https://github.com/libjxl/libjxl/releases/download/v0.11.2/jxl-x64-windows-static.zip"
          $jxlZip = "$env:TEMP\jxl.zip"
          $jxlExtract = "$env:TEMP\jxl"
          Invoke-WebRequest -Uri $jxlUrl -OutFile $jxlZip
          Expand-Archive -Path $jxlZip -DestinationPath $jxlExtract -Force
          $cjExe = Get-ChildItem $jxlExtract -Recurse -Filter "cjpegli.exe" | Select-Object -First 1
          if ($cjExe) {
            Copy-Item $cjExe.FullName "$toolsDir\cjpegli.exe"
            Write-Host "✅ Copied cjpegli.exe from libjxl release"
            # Also copy cjxl.exe from the same release
            $cjxlExe = Get-ChildItem $jxlExtract -Recurse -Filter "cjxl.exe" | Select-Object -First 1
            if ($cjxlExe) {
              Copy-Item $cjxlExe.FullName "$toolsDir\cjxl.exe"
              Write-Host "✅ Copied cjxl.exe from libjxl release"
            }
          } else {
            Write-Host "⚠️ cjpegli not found in libjxl release"
          }

          # Download ECT
          $ectUrl = "https://github.com/fhanau/Efficient-Compression-Tool/releases/download/v0.9.5/${{ matrix.ect_asset }}"
          $ectZip = "$env:TEMP\ect.zip"
          $ectExtract = "$env:TEMP\ect"
          Invoke-WebRequest -Uri $ectUrl -OutFile $ectZip
          Expand-Archive -Path $ectZip -DestinationPath $ectExtract -Force
          $ectExe = Get-ChildItem $ectExtract -Recurse -Filter "ect.exe" | Select-Object -First 1
          if ($ectExe) {
            Copy-Item $ectExe.FullName "$toolsDir\ect.exe"
            Write-Host "✅ Copied ECT"
          }

          # Download cwebp from Google
          $webpUrl = "https://storage.googleapis.com/downloads.webmproject.org/releases/webp/libwebp-1.5.0-windows-x64.zip"
          $webpZip = "$env:TEMP\webp.zip"
          $webpExtract = "$env:TEMP\webp"
          Invoke-WebRequest -Uri $webpUrl -OutFile $webpZip
          Expand-Archive -Path $webpZip -DestinationPath $webpExtract -Force
          $cwExe = Get-ChildItem $webpExtract -Recurse -Filter "cwebp.exe" | Select-Object -First 1
          if ($cwExe) {
            Copy-Item $cwExe.FullName "$toolsDir\cwebp.exe"
            Write-Host "✅ Copied cwebp.exe"
          }

          Write-Host "✅ Final bundled tools:"
          Get-ChildItem "$toolsDir" -Recurse | Format-Table Name, Length

          # Download avifenc via micromamba (conda-forge)
          $mmUrl = "https://micro.mamba.pm/api/micromamba/win-64/latest"
          $mmZip = "$env:TEMP\micromamba.tar.bz2"
          Invoke-WebRequest -Uri $mmUrl -OutFile $mmZip
          tar -xf $mmZip -C "$env:TEMP" Library/bin/micromamba.exe 2>$null
          $mmExe = "$env:TEMP\Library\bin\micromamba.exe"
          if (Test-Path $mmExe) {
            & $mmExe create -y -p "$env:TEMP\conda-avif" -c conda-forge libavif 2>&1 | Out-Null
            $avifExe = Get-ChildItem "$env:TEMP\conda-avif" -Recurse -Filter "avifenc.exe" | Select-Object -First 1
            if ($avifExe) {
              Copy-Item $avifExe.FullName "$toolsDir\avifenc.exe"
              Write-Host "✅ Copied avifenc.exe from conda-forge"
            } else {
              Write-Host "⚠️ avifenc.exe not found in conda-forge"
            }
          } else {
            Write-Host "⚠️ micromamba download failed, skipping avifenc"
          }

      # ═══════════════════════════════════════════════════════════════
      # Build
      # ═══════════════════════════════════════════════════════════════
      - name: Build Tauri app (tag release)
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "はむはむ画像圧縮くん ${{ github.ref_name }}"
          releaseBody: |
            ## ダウンロード
            - **macOS (Apple Silicon)**: `.dmg` ファイル (arm64)
            - **macOS (Intel)**: `.dmg` ファイル (x64)
            - **Windows**: `.msi` または `.exe` インストーラー

            PDF圧縮（Ghostscript）・PNG圧縮（pngquant）・JPEG圧縮（cjpegli）ツールは同梱されています。
            追加のインストールは不要です。🐹
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Build Tauri app (manual)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
